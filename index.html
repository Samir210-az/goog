<!DOCTYPE html>
<html>
<body>
    <button id="saveTest">1. Yadda saxla (OK gözlənilir)</button>
    <button id="loadTest">2. Yüklə (JSON gözlənilir)</button>
    <pre id="result"></pre>

    <script>
        const URL = "https://script.google.com/macros/s/AKfycbyGfnijLEfnqs9-FSnYnjAlypgvZU9gYa3VTejdT91dbBjOU9gCXtAHryRAry-sRf8cTw/exec";
        
        document.getElementById("saveTest").onclick = async () => {
            const res = await fetch(URL + "?action=save&name=Koray&dob=2022-01-01&reg=001&checks=test&perc=50");
            const txt = await res.text();
            document.getElementById("result").innerText = "Save cavabı: " + txt;
        };
        
        document.getElementById("loadTest").onclick = async () => {
            const res = await fetch(URL + "?action=load");
            const txt = await res.text();
            document.getElementById("result").innerText = "Load cavabı (ilk 200 simvol):\n" + txt.substring(0, 200);
        };
    </script>
</body>
</html>
