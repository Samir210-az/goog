<!DOCTYPE html>
<html>
<body>
    <button onclick="save()">Save</button>
    <button onclick="load()">Load</button>
    <pre id="out"></pre>
    <script>
        const URL = "https://script.google.com/macros/s/AKfycbygohnkH5bh7QWO6p2YnFsWHAGeJHb9KZn_VofwpQytIEKWMouapa7wRvPemMkR-yf6Gg/exec";
        
        async function save() {
            const res = await fetch(URL + "?action=save&name=Test&dob=2020-01-01&reg=1&checks=abc&perc=50");
            out.innerText = await res.text();
        }
        
        async function load() {
            const res = await fetch(URL + "?action=load");
            out.innerText = await res.text();
        }
    </script>
</body>
</html>
