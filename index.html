<!DOCTYPE html>
<html>
<body>
  <button onclick="saveTest()">Yadda saxla</button>
  <button onclick="loadTest()">Yüklə</button>
  <pre id="out"></pre>

  <script>
    const URL = "https://script.google.com/macros/s/AKfycbyJtteRJ37CBr6jaNHDyNomGHi65cix9QA6nxBoIDpPcUzrzuylcWwzgtteqjcaWjeACg/exec"; // ÖZ URL-İNİZ

    async function saveTest() {
      const res = await fetch(`${URL}?action=save&name=Test&dob=2023-01-01&reg=001&checks=top&perc=50`);
      const txt = await res.text();
      out.innerText = "Save cavabı: " + txt;
    }

    async function loadTest() {
      const res = await fetch(`${URL}?action=load`);
      const txt = await res.text();
      out.innerText = "Load cavabı:\n" + txt.slice(0, 500);
    }
  </script>
</body>
</html>
