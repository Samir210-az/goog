<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Denver II Test – Professional Hesabat + Sticky Cədvəl</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
            background: #eef2f5;
            margin: 0;
            padding: 12px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 28px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            padding: 16px 20px 24px;
        }
        h1 {
            font-size: 1.5rem;
            color: #1e6b3b;
            border-left: 5px solid #1e6b3b;
            padding-left: 18px;
            margin-top: 0;
        }
        .tabs {
            display: flex;
            gap: 8px;
            margin: 16px 0;
            flex-wrap: wrap;
            border-bottom: 1px solid #ccc;
        }
        .tab-btn {
            background: none;
            border: none;
            padding: 8px 20px;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 30px 30px 0 0;
            color: #2c5a2e;
            transition: 0.2s;
        }
        .tab-btn.active {
            background: #1e6b3b;
            color: white;
        }
        .tab-pane {
            display: none;
            animation: fade 0.2s ease;
        }
        .tab-pane.active {
            display: block;
        }
        @keyframes fade {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .info-panel {
            background: #e8f3ec;
            padding: 12px 16px;
            border-radius: 26px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
            align-items: flex-end;
        }
        .info-field {
            flex: 1;
            min-width: 130px;
        }
        .info-field label {
            font-weight: bold;
            font-size: 0.7rem;
            color: #1e6b3b;
            display: block;
            margin-bottom: 4px;
        }
        .info-field input {
            width: 100%;
            padding: 8px 12px;
            border-radius: 28px;
            border: 1px solid #cbdcc2;
            background: white;
            font-size: 0.85rem;
        }
        button {
            background: #1e6b3b;
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            margin: 4px 4px 0 0;
            font-size: 0.8rem;
            transition: 0.1s;
        }
        button:active { transform: scale(0.97); }
        .btn-secondary {
            background: #4a6a5e;
        }
        .status {
            background: #fcf8e8;
            padding: 10px 14px;
            border-radius: 18px;
            margin: 12px 0;
            border-left: 5px solid #e9b35f;
            font-size: 0.85rem;
        }
        /* GÜCLƏNDİRİLMİŞ STICKY: sol sütun + yuxarı başlıqlar */
        .table-wrapper {
            overflow-x: auto;
            overflow-y: auto;
            border: 1px solid #d4dfe3;
            border-radius: 20px;
            margin-top: 20px;
            max-height: 70vh;
            position: relative;
        }
        .test-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.72rem;
            min-width: 800px;
        }
        .test-table th,
        .test-table td {
            border: 1px solid #d0dbdf;
            padding: 8px 5px;
            text-align: center;
            vertical-align: middle;
        }
        /* Yuxarı başlıqlar (yaşlar) */
        .test-table thead th {
            position: sticky;
            top: 0;
            background: #d9e8da;
            z-index: 20;
            backdrop-filter: blur(2px);
        }
        /* Sol sütun (maddə adları) */
        .test-table td:first-child,
        .test-table th:first-child {
            position: sticky;
            left: 0;
            background-color: #fefaf0;
            z-index: 15;
            text-align: left;
        }
        .test-table th:first-child {
            background: #cbddce;
            z-index: 30;
        }
        .test-table td:first-child {
            background-color: #fefaf0;
            box-shadow: 1px 0 2px rgba(0,0,0,0.05);
        }
        .domain-row {
            background: #cbddce;
            font-weight: bold;
            text-align: left;
        }
        .checkbox-cell input {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #1e6b3b;
        }
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .search-box input {
            flex: 2;
            padding: 10px 16px;
            border-radius: 32px;
            border: 1px solid #ccc;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
            gap: 12px;
            margin-top: 20px;
        }
        .stat-card {
            background: #f0f7f0;
            padding: 12px;
            border-radius: 20px;
            text-align: center;
        }
        footer {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 25px;
            color: #5e7c6b;
        }
        .archive-row {
            cursor: pointer;
            transition: 0.1s;
        }
        .archive-row:hover {
            background: #e0f0e0;
        }
        .btn-small {
            padding: 4px 12px;
            font-size: 0.7rem;
            margin: 0;
        }
        @media (max-width: 700px) {
            .container { padding: 12px; }
            .test-table { font-size: 0.65rem; min-width: 720px; }
            .test-table td:first-child { font-size: 0.65rem; min-width: 140px; }
            button { padding: 6px 14px; font-size: 0.75rem; }
            .checkbox-cell input { width: 20px; height: 20px; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🏥 Denver II İnkişaf Testi <span style="font-size:0.8rem;">(Geriləmə Analizi + Ətraflı Plan)</span></h1>

    <div class="tabs">
        <button class="tab-btn active" data-tab="test">📋 Test cədvəli</button>
        <button class="tab-btn" data-tab="archive">📚 Arxiv & axtarış</button>
        <button class="tab-btn" data-tab="stats">📊 Statistika</button>
    </div>

    <!-- TEST PANELİ -->
    <div id="testPane" class="tab-pane active">
        <div class="info-panel">
            <div class="info-field"><label>👶 Uşağın adı</label><input type="text" id="childName" placeholder="Ad Soyad"></div>
            <div class="info-field"><label>🎂 Doğum tarixi</label><input type="date" id="dob"></div>
            <div class="info-field"><label>🆔 Qeydiyyat №</label><input type="text" id="regNo" placeholder="Qeydiyyat"></div>
            <div class="info-field"><label>📊 Faiz</label><input type="range" id="perc" min="0" max="100" value="50"><span id="percVal">50</span></div>
            <div>
                <button id="saveBtn">💾 Yadda saxla</button>
                <button id="clearCheckBtn" class="btn-secondary">🗑 Təmizlə</button>
                <button id="reportBtn" class="btn-secondary" style="background:#c96f0e;">📄 Hesabat çıxar</button>
            </div>
        </div>
        <div id="testMessage" class="status">✅ Cədvəli doldurun. "Hesabat çıxar" → geriləmə ayı və ətraflı iş planı.</div>
        <div class="table-wrapper" id="testTableWrapper"></div>
    </div>

    <!-- ARXIV (keçmiş testlər) -->
    <div id="archivePane" class="tab-pane">
        <div class="search-box">
            <input type="text" id="searchName" placeholder="Uşaq adı ilə axtar...">
            <button id="searchBtn">🔍 Axtar</button>
            <button id="refreshArchiveBtn" class="btn-secondary">🔄 Yenilə</button>
        </div>
        <div id="archiveList" style="max-height: 550px; overflow-y: auto;"></div>
    </div>

    <!-- STATİSTİKA -->
    <div id="statsPane" class="tab-pane">
        <button id="calcStatsBtn" class="btn-secondary">📈 Yenilə statistika</button>
        <div id="statsContent" class="stats-grid"></div>
    </div>
    <footer>📌 Arxivdə ad sətrinə klik → test yüklənir. "Hesabat yüklə" düyməsi ilə fərqli pəncərədə peşəkar hesabat alın.</footer>
</div>

<script>
    // ========== KONFİQURASİYA ==========
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwUFz-JQcjv7iAuSiVYgV3aRSaFNU-FWbWhL5A6Tt7vB88FhdQ_v5fvbX4pfgs159Gs9Q/exec";
    
    // ========== DENVER II MADDƏLƏRİ (4 sahə) ==========
    const domains = [
        { name: "🏃 KOBUD MOTOR", items: [ "Başını 1-2 dəq düz tutur","Üstüstə yatarkən başını qaldırır","Ayaqları ilə təpikləyir","Baş və döşü qaldırır","Başını düz saxlayır","Dayaqlı oturur","Qarından kürəyə dönür","Sürünməyə çalışır","Stabil oturur","Qaldırılanda ayaq üstə durur","Tutub qalxır","Kreslo ətrafında addımlayır","Müstəqil dayanır","Təkbaşına yeriyir","Pilləkənlərə dırmaşır","Arabaları itələyir","Kresloya dırmaşır","Arxaya doğru yeriyir","Pilləkənlə enib-qalxır","Tullanır","Qaçır","Özü stula oturur","Top atır","Düz qaçır, dırmaşır","Bir ayaqda dayanır, özü geyinir","Bir ayaqda dayanır, tullanır, velosiped" ] },
        { name: "✍ İNCƏ MOTOR", items: [ "İşığı izləyir","Zəngi yuxarı-aşağı izləyir","Nəzərini obyektdən obyektə keçirir","Kubu tutur","Əşyaları ağzına aparır","Kubu masadan qaldırır","Düşmüş əşyanı axtarır","Oyuncağı əlindən-ələ keçirir","İki əşya ilə oynayır","Kubları bir-birinə vurur","Cımbız tutuşu","Üç kiçik əşya saxlayır","Bir əl üstünlüyü","Dörd kub tutur","Əşyaları üst-üstə qoyur","Qaralamalar çəkir","3 kubdan qüllə","4 kubdan qüllə","5+ kubdan qüllə","Şaquli xətt kopyalayır","Üfüqi xətt kopyalayır","Dairə çəkir","Sancaq qaldırır","Bir göz qapalı detalları tanıyır","9 kubdan qüllə","Kərpicdən körpü","Kvadrat + dairə çəkir","Qələmi düzgün tutur" ] },
        { name: "🗣 DİL VƏ DANIŞMA", items: [ "Səslərdən qorxur","Zəng səsini dinləyir","Səs mənbəyini gözlə axtarır","Səsə baş çevirir","Musiqi eşidəndə səslənir","Vokalizasiyalar","Diqqət çəkmək üçün qışqırır","Mama/dada deyir","Saat tıqqıltısını dinləyir","2 söz bilir","3 söz bilir","Şəkilə baxır","Öz adını bilir","4-5 söz","6-7 söz","Cümlələşir","Şəkilli kitabları sevir","9 söz","12 söz","2 sözlü cümlələr","Nağıl dinləyir","20+ söz","4 oyuncağın adını çəkir","Nə? Harada? sualları","Bədən hissələrini adlandırır","Təmiz danışır, geniş cümlələr","Suallara cavab verir" ] },
        { name: "🧸 SOSİAL-ŞƏXSİ", items: [ "Qucağa alanda sakitləşir","Gülümsəyir","İnsanı izləyir","Müayinəçiyə qarşılıqlı gülümsəmə","Oyuna reaksiya","Danışana baş çevirir","Kassadan içir","Güzgüyə baxır","Fincanı tutmağa kömək edir","Güzgüdə təbəssüm","Barmaqları ilə yeyir","Əl çalır, yelləyir","Fincanı tutur","Qaşıqdan istifadə edir","Ayaqqabılarını göstərir","Qapı dəstəyini çevirir","Kubokla bacarır","Corab/ayaqqabı çıxarır","Bir bədən hissəsini tanıyır","Tualet istədiyini bildirir","Gündüz sidik nəzarəti","Başına gələni danışır","İki bədən hissəsini bilir","Dörd bədən hissəsi + qaşıq","Şalvarını tualet üçün endirir","Özü yeyir, yuyunur","Adını deyir, ev işlərində kömək edir","Əməkdaşlıq edir","Geyinir/təmizlənir" ] }
    ];
    const ageCols = ["2ay","4ay","6ay","9am","12ay","15ay","18ay","24ay","3yas","4yas","5yas","6yas"];
    const ageMonths = [2,4,6,9,12,15,18,24,36,48,60,72];
    
    // Cədvəl qurma (checkboxlar)
    function buildFullTable(checksSet = new Set()) {
        let html = `<table class="test-table"><thead>鱼<th>İnkişaf sahəsi / Maddələr</th>${ageCols.map(a=>`<th>${a}</th>`).join('')}</thead><tbody>`;
        domains.forEach(domain => {
            html += `<tr><th class="domain-row" colspan="${ageCols.length+1}">${domain.name}</th></tr>`;
            domain.items.forEach(item => {
                html += `<tr><td class="item-name">${item}</td>`;
                for(let i=0;i<ageCols.length;i++) {
                    const key = `${item}|${ageCols[i]}`;
                    const checked = checksSet.has(key) ? 'checked' : '';
                    html += `<td class="checkbox-cell"><input type="checkbox" data-item="${item.replace(/"/g, '&quot;')}" data-age="${ageCols[i]}" ${checked}></td>`;
                }
                html += `</tr>`;
            });
        });
        html += `</tbody></table>`;
        document.getElementById("testTableWrapper").innerHTML = html;
    }
    
    function getAllChecks() {
        let checks = [];
        document.querySelectorAll("#testTableWrapper input[type=checkbox]:checked").forEach(cb => {
            checks.push(cb.getAttribute("data-item") + "|" + cb.getAttribute("data-age"));
        });
        return checks;
    }
    
    function setChecksFromArray(checksArray) {
        const chkSet = new Set(checksArray);
        buildFullTable(chkSet);
    }
    
    function calculateAge(birthDateStr) {
        if(!birthDateStr) return null;
        const birth = new Date(birthDateStr);
        const today = new Date();
        let months = (today.getFullYear() - birth.getFullYear())*12 + (today.getMonth()-birth.getMonth());
        if(today.getDate() < birth.getDate()) months--;
        return months;
    }
    
    // YENİ, DƏQİQ TƏQRİBİ YAŞ HESABI (işarələnmiş maddələrin aylarının ortalaması)
    function calculateDevelopmentalAge(checkedItems) {
        if(!checkedItems.length) return 0;
        let totalMonths = 0;
        for(let item of checkedItems) {
            const agePart = item.split('|')[1];
            const idx = ageCols.indexOf(agePart);
            if(idx !== -1) totalMonths += ageMonths[idx];
        }
        return totalMonths / checkedItems.length;
    }
    
    // Geriləmə analizi (dəqiq yaş, gecikmə sayı, uyarı, inkişaf yaşı)
    function analyzeAdvanced(childName, dob, checksArray) {
        const factualAge = calculateAge(dob);
        if(factualAge === null) return { error: "Doğum tarixi keçərsiz" };
        // Yaş indeksi (gözlənilən sütun)
        let ageIndex = 0;
        for(let i=0; i<ageMonths.length; i++) {
            if(factualAge >= ageMonths[i]) ageIndex = i;
            else break;
        }
        const checkedSet = new Set(checksArray);
        let delays = [];     // yaş səviyyəsində işarələnməyənlər
        let warnings = [];   // yaşdan yuxarı işarələnməyənlər
        domains.forEach(domain => {
            domain.items.forEach(item => {
                for(let col=0; col<ageCols.length; col++) {
                    const key = `${item}|${ageCols[col]}`;
                    const isChecked = checkedSet.has(key);
                    if(col <= ageIndex && !isChecked) delays.push({ item, ageCol: ageCols[col], colMonth: ageMonths[col], domain: domain.name });
                    if(col > ageIndex && !isChecked) warnings.push({ item, ageCol: ageCols[col], domain: domain.name });
                }
            });
        });
        const developmentalAge = calculateDevelopmentalAge(checksArray);
        let delayMonths = factualAge - developmentalAge;
        if(delayMonths < 0) delayMonths = 0;
        let evaluation = "";
        if(delays.length === 0) evaluation = "✅ Normal (yaşına uyğun inkişaf)";
        else if(delays.length >= 2) evaluation = "⚠️ Anormal – Dərinləşdirilmiş qiymətləndirmə TÖVSİYƏ OLUNUR";
        else evaluation = "🔍 Şübhəli – Təkrar test və müşahidə edilməlidir";
        return { childName, dob, factualAge, developmentalAge, delayMonths, delayCount: delays.length, warningCount: warnings.length, delays, evaluation };
    }
    
    // GENİŞ İŞ PLANI (hər sahə üzrə psixoloq, loqoped, valideyn)
    function generateDetailedPlan(analysis) {
        let planHtml = `<div style="background:#eef3fc; padding:20px; border-radius:28px; margin:20px 0;">`;
        planHtml += `<h3>📘 Fərdi İntervensiya Planı (Beynəlxalq Erkən Müdaxilə Standartları)</h3>`;
        planHtml += `<p><strong>🕒 Geriləmə (İnkişaf fərqi):</strong> Faktiki yaş <strong>${analysis.factualAge} ay</strong>, təqribi inkişaf yaşı <strong>${analysis.developmentalAge.toFixed(1)} ay</strong>. <span style="background:#fff0c0;">Geriləmə: ${analysis.delayMonths.toFixed(1)} ay</span>. Bu, uşağın mütəxəssis dəstəyinə ehtiyacı olduğunu göstərir.</p>`;
        planHtml += `<p><strong>🎯 Ümumi yanaşma:</strong> Oyun əsaslı, ailə mərkəzli, müsbət təkrarlama. Hər kiçik irəliləyiş qeydə alınır.</p>`;
        
        // Gecikmələri sahələrə ayır
        const motorDelays = analysis.delays.filter(d => d.domain.includes("KOBUD"));
        const fineDelays = analysis.delays.filter(d => d.domain.includes("İNCƏ"));
        const langDelays = analysis.delays.filter(d => d.domain.includes("DİL"));
        const socialDelays = analysis.delays.filter(d => d.domain.includes("SOSİAL"));
        
        if(motorDelays.length) {
            planHtml += `<div style="margin-top:20px;"><h4>🏃 Kobud Motor (İri motor)</h4>`;
            planHtml += `<p><strong>🧠 Psixoloq / Fizioterapevt üçün metodlar:</strong> Hər gün 20 dəqiqə yerdə oyun, sürünmə oyunları, "topu tut və at", "pilləkən qalxma yarışı". Tarazlıq lövhəsi, maneəli cığır. Hər bacarıq ən az 5-7 dəfə təkrarlanmalı, müsbət gücləndirmə ilə dəstəklənməlidir. Beynəlxalq protokollara uyğun olaraq, böyük əzələ qruplarını işə salan oyunlar (yastıq qalası, evdəki stullardan tunel). Aylıq hədəf: müstəqil pilləkən qalxma, yerində tullanma.</p>`;
            planHtml += `<p><strong>👪 Valideynlər üçün gündəlik fəaliyyətlər:</strong> Parkda "mənim kimi et" oyunu (qaç, dur, fırlan). Evdə yumşaq yastıqlardan maneə yolu düzəldin – uşaq sürünərək keçsin. Hər axşam 10 dəqiqə "top qapıya" oyunu. Tullanmağı təşviq etmək üçün yerdə lentlə kvadrat çəkin.</p>`;
            planHtml += `<p><strong>✅ İzlənən hədəf bacarıqlar:</strong> ${motorDelays.slice(0,8).map(d=>d.item).join(", ")}</p></div>`;
        }
        if(fineDelays.length) {
            planHtml += `<div><h4>✍ İncə Motor (Əl-göz koordinasiyası)</h4>`;
            planHtml += `<p><strong>🧠 Psixoloq / Erqoterapevt üçün metodlar:</strong> Mozaika, lego, muncuq dizmə, qayçı ilə kəsmə, barmaq boyaları, cımbızla xırda əşyaları yerləşdirmə. Hər seansda 3-4 fərqli material, dönə-dönə “İncə Motor Çantası”. Tapşırıqlar 5-10 dəqiqə, uşağın diqqət süresinə görə paylanmalıdır.</p>`;
            planHtml += `<p><strong>👪 Valideynlər üçün ev üsulları:</strong> Gündəlik makaronı ipə düzmək (uzun muncuq), şəkilli kitabda kiçik detalları tapmaq, qum/qarğıdalı unu içində gizlənmiş oyuncaqları çıxarmaq. Barmaq boyaları ilə dairə çəkmə, plastilindən ilan düzəltmə.</p></div>`;
        }
        if(langDelays.length) {
            planHtml += `<div><h4>🗣 Dil və Danışma (Reseptiv/Ekspressiv)</h4>`;
            planHtml += `<p><strong>🧠 Psixoloq / Danışma terapevti (Loqoped) üçün metodlar:</strong> Gündəlik 20 dəqiqə şəkil kartları, əmrə uyğun hərəkət ("Mənə topu ver"). Ekpressiv dil üçün "Gördüyünü adlandır" oyunu, səsləri təqlid etmə. Reseptiv dil üçün “Bədən hissələrini göstər” tapşırıqları. Hər 2 həftədən bir yeni söz hədəfləri qoyun. Beynəlxalq praktikada dialog oxuma, sosial hekayələr.</p>`;
            planHtml += `<p><strong>👪 Valideynlər üçün tövsiyələr:</strong> Gündəlik 15 dəqiqə kitab oxuyun, şəkilləri göstərib “Bu nə?” deyə soruşun. Uşağın cümlələrini genişləndirin (məsələn “Maşın” deyəndə “Bəli, böyük qırmızı maşın gedir”). Gün ərzində nə etdiyinizi danışın (hazırlıq, yemək). Sadə mahnılar oxuyun, “Baş-çiyin-diz-ayaq” oyunu.</p></div>`;
        }
        if(socialDelays.length) {
            planHtml += `<div><h4>🧸 Sosial-Şəxsi (Özünəxidmət və ünsiyyət)</h4>`;
            planHtml += `<p><strong>🧠 Psixoloq üçün metodlar:</strong> Rollu oyunlar (ailə, nağd satıcı), emosiya kartları, növbə gözləmə oyunları, gündəlik həyat bacarıqlarının təlimi (düymə açma-qapama, ayaqqabı bağlama). Qaydaları şəkillərlə ifadə edin. Mükafat cədvəlləri (uğurlu davranışlara kiçik stimullar).</p>`;
            planHtml += `<p><strong>👪 Valideynlər üçün:</strong> Uşağa özü qaşıq tutmağa icazə verin. Sadə ev işləri (dəsmal yığmaq, fincanı masaya qoymaq). Birlikdə stol oyunları (loto, domino). "Xahiş edirəm", "sağ ol" ifadələrini hər gün modelləşdirin. Geyinib-soyunmaya vaxt ayırın, tələsməyin.</p></div>`;
        }
        if(analysis.delays.length === 0) {
            planHtml += `<p>✅ Heç bir gecikmə aşkarlanmadı. Standart inkişaf fəaliyyətləri (oxumaq, oynamaq) davam etdirilməlidir.</p>`;
        }
        planHtml += `<hr><p><strong>🌍 Qlobal Erkən Müdaxilə Qaydaları (WHO, UNESCO):</strong> Ailə mərkəzli, təbii mühit, oyunun gücü, müsbət davranış dəstəyi. Hər 3-6 aydan bir təkrar qiymətləndirmə. Bütün tövsiyələr uşağın fərdi xüsusiyyətlərinə uyğunlaşdırılmalıdır.</p>`;
        planHtml += `</div>`;
        return planHtml;
    }
    
    // HESABAT YARATMA (yalnız plan, siyahı yoxdur)
    async function generateReportFromChecks(childName, dob, checksArray) {
        if(!childName || !dob) { alert("Uşağın adı və doğum tarixi olmalıdır"); return null; }
        const analysis = analyzeAdvanced(childName, dob, checksArray);
        if(analysis.error) { alert(analysis.error); return null; }
        const plan = generateDetailedPlan(analysis);
        const reportHtml = `
        <!DOCTYPE html>
        <html>
        <head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Denver II Hesabat - ${escapeHtml(childName)}</title>
        <style>body{font-family:Segoe UI,sans-serif;margin:25px;background:#f8faf8;}.report{max-width:1100px;margin:auto;background:white;padding:28px;border-radius:32px;box-shadow:0 8px 24px rgba(0,0,0,0.08);}.info{background:#eef5ea;padding:18px;border-radius:24px;margin-bottom:25px;}.badge{font-weight:bold;font-size:1.1rem;}</style></head>
        <body>
        <div class="report">
            <h1>🏥 Denver II Gelişim Testi – Fərdi Hesabat</h1>
            <div class="info">
                <p><strong>Uşaq:</strong> ${escapeHtml(childName)}</p>
                <p><strong>Doğum tarixi:</strong> ${dob} | Faktiki yaş: ${analysis.factualAge} ay</p>
                <p><strong>Test tarixi:</strong> ${new Date().toLocaleDateString('az-AZ')}</p>
                <p><strong>📉 Təqribi inkişaf yaşı:</strong> ${analysis.developmentalAge.toFixed(1)} ay &nbsp;&nbsp;📉 <strong>Geriləmə: ${analysis.delayMonths.toFixed(1)} ay</strong></p>
                <p><strong>⚠️ Gecikmə sayı:</strong> ${analysis.delayCount} &nbsp;| <strong>🔔 Qiymətləndirmə:</strong> ${analysis.evaluation}</p>
            </div>
            ${plan}
            <footer style="margin-top:30px; font-size:0.75rem;">Bu hesabat Denver II testi, WHO və UNESCO erkən uşaqlıq müdaxilə təlimatlarına əsaslanır. Mütləq pediatr/inkişaf psixoloqu tərəfindən izlənilməlidir.</footer>
        </div>
        </body>
        </html>
        `;
        return reportHtml;
    }
    
    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
    
    // ========== SAVE & UI ==========
    const msgDiv = document.getElementById("testMessage");
    function showTestMessage(msg, col){ msgDiv.innerHTML=msg; msgDiv.style.borderLeftColor=col||"#e9b35f"; }
    
    document.getElementById("saveBtn").onclick = async () => {
        const name = document.getElementById("childName").value.trim();
        if(!name){ showTestMessage("❌ Uşaq adını yazın!","red"); return; }
        const checks = getAllChecks();
        const url = `${SCRIPT_URL}?action=save&name=${encodeURIComponent(name)}&dob=${document.getElementById("dob").value}&reg=${encodeURIComponent(document.getElementById("regNo").value)}&checks=${encodeURIComponent(checks.join(";"))}&perc=${document.getElementById("perc").value}`;
        showTestMessage("Göndərilir...","blue");
        try{
            const resp = await fetch(url);
            const txt = await resp.text();
            if(txt==="OK") showTestMessage("✅ Məlumatlar saxlanıldı!","green");
            else showTestMessage("⚠️ Xəta: "+txt,"red");
        }catch(e){ showTestMessage("❌ Şəbəkə xətası","red"); }
    };
    
    document.getElementById("reportBtn").onclick = async () => {
        const name = document.getElementById("childName").value.trim();
        const dob = document.getElementById("dob").value;
        if(!name || !dob){ showTestMessage("Hesabat üçün ad və doğum tarixi yazın","red"); return; }
        const checks = getAllChecks();
        if(checks.length===0){ showTestMessage("Heç bir işarə yoxdur","orange"); return; }
        const report = await generateReportFromChecks(name, dob, checks);
        if(report){
            const win = window.open();
            win.document.write(report);
            win.document.close();
        }
    };
    
    document.getElementById("clearCheckBtn").onclick = () => { buildFullTable(new Set()); showTestMessage("Cədvəl təmizləndi","blue"); };
    document.getElementById("perc").oninput = () => document.getElementById("percVal").innerText = document.getElementById("perc").value;
    
    // ========== ARXİV (KEÇMİŞ TESTLƏR) ==========
    let allRecords = [];
    async function loadAllData() {
        try{
            const resp = await fetch(SCRIPT_URL+"?action=load");
            const data = await resp.json();
            allRecords = Array.isArray(data) ? data : [];
            return allRecords;
        }catch(e){ return []; }
    }
    
    async function displayArchive(searchTerm=""){
        const records = await loadAllData();
        const container = document.getElementById("archiveList");
        if(!records.length){ container.innerHTML=`<div class="status">⚠️ Heç bir test yoxdur.</div>`; return; }
        let filtered = records;
        if(searchTerm.trim()) filtered = records.filter(r=>r[1] && r[1].toLowerCase().includes(searchTerm.toLowerCase()));
        if(!filtered.length){ container.innerHTML=`<div class="status">🔍 "${searchTerm}" üzrə nəticə yoxdur.</div>`; return; }
        let html = `<div class="table-wrapper"><table class="test-table"><thead><tr><th>Tarix</th><th>Uşaq adı</th><th>Doğum</th><th>Qeydiyyat</th><th>Faiz</th><th>Bac.Say</th><th>Hesabat</th></thead><tbody>`;
        filtered.slice().reverse().forEach((row,idx)=>{
            const checksField = row[4] || "";
            const count = checksField.split(";").filter(c=>c).length;
            const nameAttr = escapeHtml(row[1]||'');
            const dobAttr = row[2]||'';
            const regAttr = row[3]||'';
            const percAttr = row[5]||'50';
            const checksEnc = encodeURIComponent(checksField);
            html += `<tr class="archive-row" data-name="${nameAttr}" data-dob="${dobAttr}" data-reg="${regAttr}" data-perc="${percAttr}" data-checks="${escapeHtml(checksField)}">
                        <td>${(row[0]||'').slice(0,16)}</td>
                        <td>${nameAttr}</td>
                        <td>${dobAttr}</td>
                        <td>${regAttr}</td>
                        <td>${percAttr}</td>
                        <td>${count}</td>
                        <td><button class="btn-small archive-report-btn" data-name="${nameAttr}" data-dob="${dobAttr}" data-checks="${checksEnc}" data-perc="${percAttr}" data-reg="${regAttr}">📄 Hesabat yüklə</button></td>
                      </tr>`;
        });
        html += `</tbody></table></div><p style="font-size:0.7rem;">📌 Ad sətrinə kliklə → testi cədvələ yükləyir. Hesabat düyməsi ilə ayrı pəncərədə hesabat açılır.</p>`;
        container.innerHTML = html;
        
        // Ad sətrinə klikləməklə testi yükləmə
        document.querySelectorAll('.archive-row').forEach(tr => {
            tr.addEventListener('click', (e) => {
                if(e.target.classList.contains('archive-report-btn')) return; // düyməyə basdıqda yalnız düymə işləsin
                const name = tr.getAttribute('data-name');
                const dob = tr.getAttribute('data-dob');
                const reg = tr.getAttribute('data-reg');
                const perc = tr.getAttribute('data-perc');
                const checksStr = tr.getAttribute('data-checks');
                document.getElementById("childName").value = name;
                document.getElementById("dob").value = dob;
                document.getElementById("regNo").value = reg;
                document.getElementById("perc").value = perc || 50;
                document.getElementById("percVal").innerText = perc || 50;
                const checksArray = checksStr ? checksStr.split(";").filter(c=>c) : [];
                setChecksFromArray(checksArray);
                showTestMessage(`📂 "${name}" testi yükləndi. "Hesabat çıxar" edə bilərsiniz.`, "blue");
                document.querySelector('.tab-btn[data-tab="test"]').click();
            });
        });
        // Hesabat düymələri üçün ayrıca əlaqə
        document.querySelectorAll('.archive-report-btn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                e.stopPropagation();
                const name = btn.getAttribute('data-name');
                const dob = btn.getAttribute('data-dob');
                const checksStr = btn.getAttribute('data-checks');
                const checksArray = checksStr ? decodeURIComponent(checksStr).split(";").filter(c=>c) : [];
                if(!name || !dob) { alert("Məlumatlar tam deyil"); return; }
                const report = await generateReportFromChecks(name, dob, checksArray);
                if(report){
                    const win = window.open();
                    win.document.write(report);
                    win.document.close();
                }
            });
        });
    }
    
    // Statistikalar
    async function displayStats(){
        const records = await loadAllData();
        if(!records.length){ document.getElementById("statsContent").innerHTML=`<div class="stat-card">Məlumat yoxdur</div>`; return; }
        const total = records.length;
        const unique = new Set(records.map(r=>r[1])).size;
        let skillCount = {};
        records.forEach(r=>{ (r[4]||"").split(";").forEach(s=>{ if(s) skillCount[s]=(skillCount[s]||0)+1; }); });
        const top = Object.entries(skillCount).sort((a,b)=>b[1]-a[1]).slice(0,5);
        const avgPerc = records.reduce((s,r)=>s+(parseInt(r[5])||0),0)/total;
        document.getElementById("statsContent").innerHTML = `<div class="stat-card"><h3>📋 Ümumi testlər</h3><p>${total}</p></div>
        <div class="stat-card"><h3>👶 Fərqli uşaqlar</h3><p>${unique}</p></div>
        <div class="stat-card"><h3>📊 Orta faiz</h3><p>${avgPerc.toFixed(1)}</p></div>
        <div class="stat-card"><h3>🏆 Top 5 bacarıq</h3><ul>${top.map(t=>`<li>${t[0].slice(0,35)}... (${t[1]})</li>`).join('')}</ul></div>`;
    }
    
    // Tab keçidlər
    document.querySelectorAll(".tab-btn").forEach(btn => {
        btn.addEventListener("click", () => {
            document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
            btn.classList.add("active");
            document.querySelectorAll(".tab-pane").forEach(p=>p.classList.remove("active"));
            const tab = btn.getAttribute("data-tab");
            document.getElementById(`${tab}Pane`).classList.add("active");
            if(tab==="archive") displayArchive(document.getElementById("searchName").value);
            if(tab==="stats") displayStats();
        });
    });
    document.getElementById("searchBtn").onclick = () => displayArchive(document.getElementById("searchName").value);
    document.getElementById("refreshArchiveBtn").onclick = () => displayArchive(document.getElementById("searchName").value);
    document.getElementById("calcStatsBtn").onclick = () => displayStats();
    
    buildFullTable(new Set());
    showTestMessage("Hazır. Cədvəldə başlıqlar hər zaman görsənir. Hesabatda geriləmə ayı və ətraflı iş planı var.","green");
</script>
</body>
</html>
