    const ageCols = ["2ay","4ay","6ay","9am","12ay","15ay","18ay","24ay","3yas","4yas","5yas","6yas"];
    const ageMonths = [2,4,6,9,12,15,18,24,36,48,60,72];
        // ========== KÖMƏKÇİ FUNKSİYALAR (toxunulmaz) ==========
    function calculateAge(birthDateStr) { if(!birthDateStr) return null; const b=new Date(birthDateStr), t=new Date(); let m=(t.getFullYear()-b.getFullYear())*12+(t.getMonth()-b.getMonth()); if(t.getDate()<b.getDate()) m--; return m; }
    function getAgeIndex(months) { if(months===null) return null; let idx=0; for(let i=0;i<ageMonths.length;i++) if(months>=ageMonths[i]) idx=i; else break; return idx; }
    
    function buildFullTable() {
        let html = `<table class="test-table"><thead><th>İnkişaf sahəsi / Maddə (normal interval, ay)</th>${ageCols.map(a=>`<th>${a}</th>`).join('')}</thead><tbody>`;
        let curDom = "";
        items.forEach(i=>{
            if(i.domain !== curDom) { html += `<tr><th class="domain-row" colspan="${ageCols.length+1}">${i.domain}</th></tr>`; curDom = i.domain; }
            html += `<tr><td style="text-align:left;">${i.name} (${i.minMonth}-${i.maxMonth} ay)</td>`;
            for(let c=0;c<ageCols.length;c++) html += `<td class="checkbox-cell"><input type="checkbox" data-item="${i.name.replace(/"/g, '&quot;')}" data-age="${ageCols[c]}"></td>`;
            html += `</tr>`;
        });
        html += `</tbody></table>`;
        document.getElementById("testTableWrapper").innerHTML = html;
    }
    function buildDynamicTable(months) {
        const ageIndex = getAgeIndex(months);
        const maxCol = Math.min(ageIndex+2, ageCols.length-1);
        const visibleCols = ageCols.slice(0, maxCol+1);
        const filtered = items.filter(i => i.minMonth <= months && i.maxMonth >= months-3);
        if(!filtered.length) { document.getElementById("testTableWrapper").innerHTML = `<div class="status">Bu yaş üçün maddə yoxdur</div>`; return; }
        let html = `<table class="test-table"><thead><th>İnkişaf sahəsi / Maddə (normal interval)</th>${visibleCols.map(a=>`<th>${a}</th>`).join('')}</thead><tbody>`;
        let curDom = "";
        filtered.forEach(i=>{
            if(i.domain !== curDom) { html += `<tr><th class="domain-row" colspan="${visibleCols.length+1}">${i.domain}</th></tr>`; curDom = i.domain; }
            html += `<td>${i.name} (${i.minMonth}-${i.maxMonth} ay)</td>`;
            for(let c=0;c<=maxCol;c++) html += `<td class="checkbox-cell"><input type="checkbox" data-item="${i.name.replace(/"/g, '&quot;')}" data-age="${ageCols[c]}"></td>`;
            html += `</tr>`;
        });
        html += `</tbody></table>`;
        document.getElementById("testTableWrapper").innerHTML = html;
    }
    function getAllChecks() { let ch=[]; document.querySelectorAll("#testTableWrapper input:checked").forEach(cb=>ch.push(cb.dataset.item+"|"+cb.dataset.age)); return ch; }
    function setChecksFromArray(arr, months) { if(months!==undefined&&months!==null) buildDynamicTable(months); else buildFullTable(); const s=new Set(arr); document.querySelectorAll("#testTableWrapper input").forEach(cb=>{ if(s.has(cb.dataset.item+"|"+cb.dataset.age)) cb.checked=true; }); }
    
    function analyzeAdvanced(childName, dob, checks) {
        const factualAge = calculateAge(dob);
        if(factualAge===null) return {error:"Doğum tarixi xəta"};
        const ageIndex = getAgeIndex(factualAge);
        const set = new Set(checks);
        let delays=[], warnings=[];
        document.querySelectorAll("#testTableWrapper tbody tr").forEach(row=>{
            let itemName = row.cells[0]?.innerText?.split(" (")[0];
            if(!itemName) return;
            for(let i=1;i<row.cells.length;i++){
                let inp = row.cells[i].querySelector("input");
                if(!inp) continue;
                let ageCol = inp.dataset.age;
                let colIdx = ageCols.indexOf(ageCol);
                let isChecked = inp.checked;
                if(colIdx <= ageIndex && !isChecked) delays.push({item:itemName, ageCol});
                if(colIdx > ageIndex && !isChecked) warnings.push({item:itemName, ageCol});
            }
        });
        let totalMonths=0, cnt=0;
        checks.forEach(ch=>{ let idx=ageCols.indexOf(ch.split('|')[1]); if(idx!==-1){ totalMonths+=ageMonths[idx]; cnt++; } });
        const devAge = cnt>0 ? totalMonths/cnt : 0;
        let delayMonths = factualAge - devAge; if(delayMonths<0) delayMonths=0;
        let evalTxt = "";
        if(delays.length===0) evalTxt="✅ Normal (yaşına uyğun inkişaf)";
        else if(delays.length>=2) evalTxt="⚠️ Anormal – Dərinləşdirilmiş qiymətləndirmə TÖVSİYƏ OLUNUR";
        else evalTxt="🔍 Şübhəli – Təkrar test və müşahidə edilməlidir";
        return { childName, dob, factualAge, developmentalAge:devAge, delayMonths, delayCount:delays.length, warningCount:warnings.length, delays, evaluation:evalTxt };
    }
    
    // ========== GENİŞ TÖVSİYYƏ FUNKSİYASI (əvvəlki kimi, dəyişməz) ==========
    function generateDetailedPlan(analysis, behavior) {

        else if (devAge < 36) interval = "24-36";

        else interval = "60-72";
        
        const recommendations = {

            "24-36": { psych: "Rol oyunları, emosiya tənzimləmə, mükafat cədvəli.", speech: "3-4 sözlü cümlələr, hekayə, bədən hissələri, 'niyə?'.", ergo: "Kvadrat kopyalama, kiçik muncuqlar, düymə/fermuar, labirint.", physio: "Bir ayaqda 5 saniyə, topu hədəfə atma, 'don-qaç'.", parent: "Məktəbə hazırlıq, müstəqilliyi dəstəklə, müsbət intizam." },
            "36-48": { psych: "Qrup oyunları, emosiya tanıma, problem həlli.", speech: "Mürəkkəb cümlələr, rənglər, formalar, şeir, hekayə.", ergo: "Xaç (+), adın baş hərfi, puzzle 4-6 hissə, qayçı ilə kəsmə.", physio: "Tək ayaqda tullanma, top atma-tutma, velosiped, xətt üzərində gəzinti.", parent: "Uşağın suallarına cavab, birlikdə yemək, musiqi, məktəbə hazırlıq." },
            "48-60": { psych: "Məğlubiyyət/qələbə reaksiyası, müstəqil seçim, dostluq.", speech: "Təfərrüatlı hekayə, riyazi dil, məktəb lüğəti.", ergo: "Üçbucaq, almaz, kiçik legolar, ad-soyad yazma, ayaqqabı bağlama.", physio: "İp atlama, bir ayaqda 10 saniyə, topu səkkiz şəklində sürmə, istiqamət dəyişmə.", parent: "Məktəbə hazırlıq dəstəyi, stol oyunları, məsuliyyət vermə." },
            "60-72": { psych: "Mücərrəd düşüncə, empatiya, ev işləri, heyvan baxımı.", speech: "1000+ söz, mürəkkəb zamanlar, söhbət, aydın tələffüz.", ergo: "K i ç i k y a z ı, 50+ puzzle, yemək hazırlığı (təhlükəsiz).", physio: "Mürəkkəb idman, daban-ucma xətt, sürətli qaçışda ani dayanma, tarazlıq.", parent: "Məktəbə emosional hazırlıq, idman/musiqi, gündəlik oxuma, layihələr." }
        };
        const r = recommendations[interval];
        let planHtml = `<div style="background:#eef3fc; padding:22px; border-radius:28px; margin:20px 0;">
            <h3>📘 Fərdi İntervensiya Planı (təqribi inkişaf yaşı: ${devAge.toFixed(1)} ay → interval ${interval})</h3>
            <p><strong>🕒 Faktiki yaş:</strong> ${analysis.factualAge} ay &nbsp;|&nbsp; <strong>Təqribi inkişaf yaşı:</strong> ${analysis.developmentalAge.toFixed(1)} ay &nbsp;|&nbsp; <strong>Geriləmə:</strong> ${analysis.delayMonths.toFixed(1)} ay</p>
            <p><strong>🧠 Psixoloq qeydləri:</strong><br>${escapeHtml(behavior) || "Qeyd yoxdur."}</p>`;
        if(analysis.delays.length===0) planHtml += `<p>✅ Heç bir gecikmə yoxdur. Standart fəaliyyətlər kifayətdir.</p>`;

                         <div><h4><i class="fas fa-comments"></i> ${r.speech}</h4></div>
                         <div><h4><i class="fas fa-hand-peace"></i> ${r.ergo}</h4></div>
                         <div><h4><i class="fas fa-running"></i> ${r.physio}</h4></div>
                         <div><h4><i class="fas fa-users"></i> ${r.parent}</h4></div>`;
        }
        planHtml += `<hr><p><strong>🌍 Beynəlxalq standartlar (WHO – Ümumdünya Səhiyyə Təşkilatı, UNESCO – BMT Təhsil, Elm və Mədəniyyət Təşkilatı):</strong> Erkən müdaxilə, ailə mərkəzli, oyun əsaslı, müsbət davranış dəstəyi. Hər 3-6 ayda təkrarlayın.</p></div>`;
        return planHtml;

    async function generateReport(name, dob, checks, behavior, specialist) {
        if(!name||!dob) return null;
        const analysis = analyzeAdvanced(name, dob, checks);
        if(analysis.error) return null;
        const plan = generateDetailedPlan(analysis, behavior);
        return `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Denver II Hesabat - ${escapeHtml(name)}</title>

    function escapeHtml(str) { return str.replace(/[&<>]/g, m=>{if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
        // ========== İDARƏETMƏ ==========
