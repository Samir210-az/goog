const ageCols = ["2ay","4ay","6ay","9am","12ay","15ay","18ay","24ay","3yas","4yas","5yas","6yas"];
const ageMonths = [2,4,6,9,12,15,18,24,36,48,60,72];
    // ========== KÖMƏKÇİ FUNKSİYALAR (tam, işlək versiya) ==========
function calculateAge(birthDateStr) {
    if(!birthDateStr) return null;
    const b = new Date(birthDateStr);
    const t = new Date();
    let months = (t.getFullYear() - b.getFullYear()) * 12 + (t.getMonth() - b.getMonth());
    if(t.getDate() < b.getDate()) months--;
    return months;
}

function getAgeIndex(months) {
    if(months === null) return null;
    let idx = 0;
    for(let i = 0; i < ageMonths.length; i++) {
        if(months >= ageMonths[i]) idx = i;
        else break;
    }
    return idx;
}

function buildFullTable() {
    let html = `<table class="test-table"><thead><th>İnkişaf sahəsi / Maddə (normal interval, ay)</th>${ageCols.map(a => `<th>${a}</th>`).join('')}</thead><tbody>`;
    let curDom = "";
    items.forEach(i => {
        if(i.domain !== curDom) {
            html += `<tr><th class="domain-row" colspan="${ageCols.length + 1}">${i.domain}</th></tr>`;
            curDom = i.domain;
        }
        html += `<tr><td style="text-align:left;">${i.name} (${i.minMonth}-${i.maxMonth} ay)</td>`;
        for(let c = 0; c < ageCols.length; c++) {
            html += `<td class="checkbox-cell"><input type="checkbox" data-item="${i.name.replace(/"/g, '&quot;')}" data-age="${ageCols[c]}"></td>`;
        }
        html += `</tr>`;
    });
    html += `</tbody></table>`;
    document.getElementById("testTableWrapper").innerHTML = html;
}

function buildDynamicTable(months) {
    const ageIndex = getAgeIndex(months);
    const maxCol = Math.min(ageIndex + 2, ageCols.length - 1);
    const visibleCols = ageCols.slice(0, maxCol + 1);
    const filtered = items.filter(i => i.minMonth <= months && i.maxMonth >= months - 3);
    if(!filtered.length) {
        document.getElementById("testTableWrapper").innerHTML = `<div class="status">Bu yaş üçün maddə yoxdur</div>`;
        return;
    }
    let html = `<table class="test-table"><thead><th>İnkişaf sahəsi / Maddə (normal interval)</th>${visibleCols.map(a => `<th>${a}</th>`).join('')}</thead><tbody>`;
    let curDom = "";
    filtered.forEach(i => {
        if(i.domain !== curDom) {
            html += `<tr><th class="domain-row" colspan="${visibleCols.length + 1}">${i.domain}</th></tr>`;
            curDom = i.domain;
        }
        html += `<td>${i.name} (${i.minMonth}-${i.maxMonth} ay)</td>`;
        for(let c = 0; c <= maxCol; c++) {
            html += `<td class="checkbox-cell"><input type="checkbox" data-item="${i.name.replace(/"/g, '&quot;')}" data-age="${ageCols[c]}"></td>`;
        }
        html += `</tr>`;
    });
    html += `</tbody></table>`;
    document.getElementById("testTableWrapper").innerHTML = html;
}

function getAllChecks() {
    let ch = [];
    document.querySelectorAll("#testTableWrapper input:checked").forEach(cb => {
        ch.push(cb.dataset.item + "|" + cb.dataset.age);
    });
    return ch;
}

function setChecksFromArray(arr, months) {
    if(months !== undefined && months !== null) buildDynamicTable(months);
    else buildFullTable();
    const s = new Set(arr);
    document.querySelectorAll("#testTableWrapper input").forEach(cb => {
        if(s.has(cb.dataset.item + "|" + cb.dataset.age)) cb.checked = true;
    });
}

function analyzeAdvanced(childName, dob, checks) {
    const factualAge = calculateAge(dob);
    if(factualAge === null) return { error: "Doğum tarixi xəta" };
    const ageIndex = getAgeIndex(factualAge);
    const set = new Set(checks);
    let delays = [], warnings = [];
    document.querySelectorAll("#testTableWrapper tbody tr").forEach(row => {
        let itemName = row.cells[0]?.innerText?.split(" (")[0];
        if(!itemName) return;
        for(let i = 1; i < row.cells.length; i++) {
            let inp = row.cells[i].querySelector("input");
            if(!inp) continue;
            let ageCol = inp.dataset.age;
            let colIdx = ageCols.indexOf(ageCol);
            let isChecked = inp.checked;
            if(colIdx <= ageIndex && !isChecked) delays.push({ item: itemName, ageCol });
            if(colIdx > ageIndex && !isChecked) warnings.push({ item: itemName, ageCol });
        }
    });
    let totalMonths = 0, cnt = 0;
    checks.forEach(ch => {
        let idx = ageCols.indexOf(ch.split('|')[1]);
        if(idx !== -1) {
            totalMonths += ageMonths[idx];
            cnt++;
        }
    });
    const devAge = cnt > 0 ? totalMonths / cnt : 0;
    let delayMonths = factualAge - devAge;
    if(delayMonths < 0) delayMonths = 0;
    let evalTxt = "";
    if(delays.length === 0) evalTxt = "✅ Normal (yaşına uyğun inkişaf)";
    else if(delays.length >= 2) evalTxt = "⚠️ Anormal – Dərinləşdirilmiş qiymətləndirmə TÖVSİYƏ OLUNUR";
    else evalTxt = "🔍 Şübhəli – Təkrar test və müşahidə edilməlidir";
    return {
        childName, dob, factualAge,
        developmentalAge: devAge,
        delayMonths,
        delayCount: delays.length,
        warningCount: warnings.length,
        delays,
        evaluation: evalTxt
    };
        }

        if(checks.length===0) { msgDiv.innerHTML = "Heç bir işarə yoxdur!"; return; }
        const behavior = document.getElementById("behaviorNotes").value;
        const report = await generateReport(name, dob, checks, behavior, specialist);
        if(report) { const win = window.open(); win.document.write(report); win.document.close(); }
    };
    
    document.getElementById("clearCheckBtn").onclick = () => { updateTable(); msgDiv.innerHTML = "Cədvəl təmizləndi."; };
    
    // ========== ARXİV (specialist sütunu) ==========
    let allRecords = [];
    async function loadAllData() {
        try {
            const resp = await fetch(SCRIPT_URL + "?action=load");
            if(!resp.ok) throw new Error("HTTP "+resp.status);
            const data = await resp.json();
            allRecords = Array.isArray(data) ? data : [];
            return allRecords;
        } catch(e) { console.error("load xətası", e); return []; }
    }
    async function displayArchive(searchTerm=""){
        const records = await loadAllData();
        const container = document.getElementById("archiveList");
        if(!records.length){ container.innerHTML=`<div class="status">⚠️ Heç bir test yoxdur.</div>`; return; }
        let filtered = records;
        if(searchTerm.trim()) filtered = records.filter(r=>r[1] && r[1].toLowerCase().includes(searchTerm.toLowerCase()));
        if(!filtered.length){ container.innerHTML=`<div class="status">🔍 "${searchTerm}" üzrə nəticə yoxdur.</div>`; return; }
        let html = `<div class="table-wrapper"><table class="test-table"><thead><th>Tarix</th><th>Uşaq adı</th><th>Doğum</th><th>Mütəxəssis</th><th>Bac.Say</th><th>Hesabat</th></thead><tbody>`;
        filtered.slice().reverse().forEach(row=>{
            const checksField = row[4] || "";
            const specialistField = row[5] || "";
            const count = checksField.split(";").filter(c=>c).length;
            const nameAttr = escapeHtml(row[1]||''), dobAttr = row[2]||'', regAttr = row[3]||'', specAttr = escapeHtml(specialistField);
            html += `<tr class="archive-row" data-name="${nameAttr}" data-dob="${dobAttr}" data-reg="${regAttr}" data-specialist="${specAttr}" data-checks="${escapeHtml(checksField)}">
                         <td>${(row[0]||'').slice(0,16)}</td>
                          <td>${nameAttr}</td>
                          <td>${dobAttr}</td>
                          <td>${specAttr || "—"}</td>
                          <td>${count}</td>
                          <td><button class="btn-small archive-report-btn" data-name="${nameAttr}" data-dob="${dobAttr}" data-specialist="${specAttr}" data-checks="${encodeURIComponent(checksField)}">📄 Hesabat</button></td>
                        </tr>`;
        });
        html += `</tbody></table></div><p>📌 Ad sətrinə klik → test yüklənir. Hesabat düyməsi ilə ayrı pəncərədə hesabat açılır.</p>`;
        container.innerHTML = html;
        
        document.querySelectorAll('.archive-row').forEach(tr=>{
            tr.addEventListener('click', (e)=>{
                if(e.target.classList.contains('archive-report-btn')) return;
                const name = tr.dataset.name;
                const dob = tr.dataset.dob;
                const reg = tr.dataset.reg;
                const specialist = tr.dataset.specialist || "";
                const checksStr = tr.dataset.checks;
                document.getElementById("childName").value = name;
                dobInp.value = dob;
                document.getElementById("regNo").value = reg;
                document.getElementById("specialist").value = specialist;
                const checksArr = checksStr ? checksStr.split(";").filter(c=>c) : [];
                if(dob) setChecksFromArray(checksArr, calculateAge(dob));
                else setChecksFromArray(checksArr, null);
                msgDiv.innerHTML = `📂 "${name}" testi yükləndi. İndi "Hesabat çıxar" edə bilərsiniz.`;
                document.querySelector('.tab-btn[data-tab="test"]').click();
            });
        });
        document.querySelectorAll('.archive-report-btn').forEach(btn=>{
            btn.addEventListener('click', async (e)=>{
                e.stopPropagation();
                const name = btn.dataset.name;
                const dob = btn.dataset.dob;
                const specialist = btn.dataset.specialist || "";
                const checksStr = decodeURIComponent(btn.dataset.checks);
                const checksArr = checksStr ? checksStr.split(";").filter(c=>c) : [];
                if(!name || !dob) return;
                const report = await generateReport(name, dob, checksArr, "", specialist);
                if(report){ const w = window.open(); w.document.write(report); w.document.close(); }
            });
        });
    }
    
    async function displayStats(){
        const records = await loadAllData();
        if(!records.length){ document.getElementById("statsContent").innerHTML=`<div class="stat-card">Məlumat yoxdur</div>`; return; }
        const total = records.length, unique = new Set(records.map(r=>r[1])).size;
        let skillCount = {};
        records.forEach(r=>{ (r[4]||"").split(";").forEach(s=>{ if(s) skillCount[s]=(skillCount[s]||0)+1; }); });
        const top = Object.entries(skillCount).sort((a,b)=>b[1]-a[1]).slice(0,5);
        document.getElementById("statsContent").innerHTML = `<div class="stat-card"><h3>📋 Ümumi testlər</h3><p>${total}</p></div>
        <div class="stat-card"><h3>👶 Fərqli uşaqlar</h3><p>${unique}</p></div>
        <div class="stat-card"><h3>🏆 Top 5 bacarıq</h3><ul>${top.map(t=>`<li>${t[0].slice(0,35)} (${t[1]})</li>`).join('')}</ul></div>`;
    }
    
    // Təlimat (toxunulmaz – əvvəlki kimi)
    document.getElementById("guidanceText").innerHTML = `
        <h2>📘 Denver II Testi – Tam Orijinal Təlimat</h2>
        <p><strong>Denver II (DDST)</strong> uşağın doğumdan 6 yaşa qədər inkişafını dörd əsas sahədə (kobud motor, incə motor-adaptiv, dil, sosial-şəxsi) qiymətləndirən, dünyada ən geniş istifadə olunan <strong>tarama (skrininq) testidir</strong>. 125 maddədən ibarətdir (orijinal versiya). Test <strong>diaqnoz qoymur</strong>, lakin inkişaf gecikmələrini vaxtında aşkarlamağa imkan verir.</p>
        <h3>🎯 Məqsəd</h3>
        <p>Uşağın yaşına uyğun inkişaf bacarıqlarını müəyyən etmək, potensial geriləmələri sənədləşdirmək, erkən müdaxilə üçün yol xəritəsi təqdim etmək.</p>
        <h3>✅ Testin keçirilmə qaydası (orijinal)</h3>
        <ul><li><strong>Materiallar:</strong> Qırmızı toplu sap, çıngıraq, zınqırov, tennis topu, kağız, qırmızı karandaş, stəkan, kubiklər, kişmiş, oyuncaq kukla, şəkillər dəsti.</li>
        <li><strong>Yaş xəttinin çəkilməsi:</strong> Doğum tarixinə əsasən uşağın <strong>kronoloji yaşı</strong> hesablanır, cədvəldə şaquli xətt çəkilir. Vaxtından əvvəl doğulanlarda düzəliş edilir.</li>
        <li><strong>Maddələrin tətbiqi:</strong> Yaş xəttinin <strong>solunda</strong> qalan bütün maddələr uşağa oyun formatında təqdim olunur. Müşahidəçi işarələri: ✓ (bacarır), ✗ (bacarmır), R (imtina), NO (imkan olmayıb).</li>
        <li><strong>Qiymətləndirmə:</strong> Yaş xəttinin solunda olub bacarılmayan hər maddə <strong>Gecikmə</strong>; sağında olub bacarılmayanlar <strong>Uyarı</strong> hesab olunur. Nəticə: <strong>Normal</strong> (0 gecikmə, ≤1 uyarı), <strong>Şübhəli</strong> (1 gecikmə və/ya ≥2 uyarı), <strong>Anormal</strong> (≥2 gecikmə).</li></ul>
        <h3>🤖 Bu avtomatlaşdırılmış sistemin iş prinsipi</h3>
        <ul><li>✅ 120+ orijinal maddə.</li><li>✅ Yaşa uyğun dinamik filtr – doğum tarixinə əsasən uyğun maddələr göstərilir.</li><li>✅ Virtual yaş xətti, gecikmə/uyarı avtomatik hesablanır.</li><li>✅ Psixoloq qeydləri hesabata əlavə olunur.</li><li>✅ Yaşa uyğun ətraflı fərdi müdaxilə planı.</li><li>✅ Google Cədvəl arxivi, axtarış, statistika.</li><li>✅ Mütəxəssis adı hesabatda göstərilir.</li></ul>
        <p><strong>Beynəlxalq uyğunluq:</strong> Ümumdünya Səhiyyə Təşkilatı (WHO) və UNESCO prinsiplərinə tam uyğundur.</p>
    `;
    
    document.querySelectorAll(".tab-btn").forEach(btn=>{
        btn.addEventListener("click",()=>{
            document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
            btn.classList.add("active");
            document.querySelectorAll(".tab-pane").forEach(p=>p.classList.remove("active"));
            const tab = btn.dataset.tab;
            document.getElementById(`${tab}Pane`).classList.add("active");
            if(tab==="archive") displayArchive(document.getElementById("searchName").value);
            if(tab==="stats") displayStats();
        });
    });
    document.getElementById("searchBtn").onclick = () => displayArchive(document.getElementById("searchName").value);
    document.getElementById("refreshArchiveBtn").onclick = () => displayArchive(document.getElementById("searchName").value);
    document.getElementById("calcStatsBtn").onclick = () => displayStats();
    
    buildFullTable();
    msgDiv.innerHTML = "✅ Hazır. Mütəxəssis adı əlavə edildi. Hesabat faktiki yaşa uyğunlaşdırıldı – 10 aylıq uşağa uyğun tövsiyələr verilir. Suallar, filtr, arxiv, statistika, təlimat toxunulmazdır.";
</script>
</body>
</html>
