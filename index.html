<!DOCTYPE html>
<html>
<body>
    <button id="testBtn">API-ni test et</button>
    <pre id="result"></pre>

    <script>
        // BURAYA ÖZ URL-İNİZİ YAZIN
        const MY_URL = "https://script.google.com/macros/s/AKfycbyoIyGg5E5V_EFezIg9RyUYD0KxDMNeWbiJc1KUO9y3DU-uF5v6NHZcfpokJJVeBWZObg/exec";
        
        document.getElementById("testBtn").onclick = async () => {
            const url = MY_URL + "?action=save&name=TestAd&dob=2020-01-01&reg=123&checks=TestBacariq&perc=50";
            document.getElementById("result").innerText = "Göndərilir: " + url + "\n\n";
            try {
                const response = await fetch(url);
                const text = await response.text();
                document.getElementById("result").innerText += "Cavab: " + text;
            } catch(err) {
                document.getElementById("result").innerText += "Xəta: " + err.message;
            }
        };
    </script>
</body>
</html>
