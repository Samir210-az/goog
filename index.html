<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SECURITY GROUP | Test Kataloqu</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Righteous&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #f5f7fc 0%, #e9edf2 100%);
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            padding: 2rem 1.5rem;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Rəngarəng başlıq */
        .security-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .security-header h1 {
            font-family: 'Bebas Neue', 'Righteous', 'Impact', cursive;
            font-size: 5rem;
            font-weight: 700;
            letter-spacing: 6px;
            text-transform: uppercase;
            background: linear-gradient(90deg, 
                #ff4d4d, #ff9a3c, #ffd93d, #6bcb77, #4d9de0, #9b59b6, #ff6b6b);
            background-size: 300% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: rainbowMove 5s linear infinite;
            text-shadow: 2px 2px 12px rgba(0,0,0,0.1);
            margin-bottom: 0.2rem;
        }

        @keyframes rainbowMove {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        @media (max-width: 700px) {
            .security-header h1 { font-size: 3.2rem; letter-spacing: 3px; }
        }
        @media (max-width: 480px) {
            .security-header h1 { font-size: 2.5rem; letter-spacing: 2px; }
        }

        .security-header .badge {
            display: inline-block;
            margin-top: 12px;
            font-size: 1rem;
            font-weight: 500;
            color: #2c3e50;
            background: rgba(255,255,240,0.7);
            backdrop-filter: blur(4px);
            padding: 0.3rem 1.2rem;
            border-radius: 40px;
            letter-spacing: 1px;
        }

        /* Grid: hər sətirdə 3 kvadrat */
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
            justify-items: center;
            align-items: stretch;
        }

        .card {
            position: relative;
            width: 100%;
            background: #ffffff;
            border-radius: 32px;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.2), 0 0 0 1px rgba(255,255,255,0.5) inset;
            transition: transform 0.25s ease, box-shadow 0.3s ease;
            cursor: pointer;
            overflow: hidden;
            aspect-ratio: 1 / 1;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 28px 40px -15px rgba(0, 0, 0, 0.3);
        }

        .card-link {
            display: block;
            width: 100%;
            height: 100%;
            text-decoration: none;
            position: relative;
        }

        .image-wrapper {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: relative;
            background: #1e2f3a;
        }

        .image-wrapper img, .image-wrapper svg {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .card:hover .image-wrapper img,
        .card:hover .image-wrapper svg {
            transform: scale(1.03);
        }

        /* Şəkil üzərində böyük hərflərlə mətn */
        .overlay-text {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: linear-gradient(0deg, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.4) 70%, transparent 100%);
            backdrop-filter: blur(2px);
            padding: 1.2rem 0.8rem;
            text-align: center;
        }

        .overlay-text span {
            display: block;
            font-size: 1.8rem;
            font-weight: 900;
            letter-spacing: 2px;
            color: #fff;
            text-shadow: 2px 2px 12px rgba(0,0,0,0.7);
            text-transform: uppercase;
            font-family: 'Impact', 'Arial Black', 'Segoe UI Black', sans-serif;
        }

        @media (max-width: 900px) {
            .grid { gap: 1.2rem; }
            .overlay-text span { font-size: 1.3rem; letter-spacing: 1px; }
        }
        @media (max-width: 700px) {
            .grid { grid-template-columns: repeat(2, 1fr); gap: 1rem; }
            .overlay-text span { font-size: 1.1rem; }
            body { padding: 1.2rem; }
        }
        @media (max-width: 480px) {
            .grid { grid-template-columns: 1fr; gap: 1.5rem; }
            .overlay-text span { font-size: 1.4rem; }
        }

        .footer-note {
            text-align: center;
            margin-top: 3.8rem;
            font-size: 0.85rem;
            color: #4a5b6e;
            font-weight: 500;
            border-top: 1px solid rgba(0,0,0,0.08);
            padding-top: 2rem;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="security-header">
        <h1>SECURITY GROUP</h1>
        <div class="badge">🎯 test kataloqu &nbsp;|&nbsp; peşəkar diaqnostika</div>
    </div>

    <div class="grid" id="dynamicGrid">
        <!-- JS ilə 5 test kartı yaradılacaq -->
    </div>
    <div class="footer-note">
        ✨ Hər kvadrata klik → test yeni pəncərədə açılır ✨
    </div>
</div>

<script>
    // ============================================================
    // SİZİN 5 TEST LINKİ (adlara uyğun şəkillər seçildi)
    // Hər test üçün: img, url, title (böyük hərflə görünür)
    // CBT testi üçün şəkil sizin göndərdiyiniz "1000331202.webp"
    // mətnindən SVG formatında hazırlanmışdır.
    // ============================================================
    const testItems = [
        {
            img: "https://picsum.photos/id/215/600/600",  // uşaq inkişafı (Denver II)
            url: "https://samir210-az.github.io/goog/",
            title: "DENVER II TEST"
        },
        {
            // CBT QİYMƏTLƏNDİRMƏ – sizin şəklinizin məzmunu (THOUGHTS, FEELINGS, CBT, PHYSICAL, BEHAVIORS, REACTIONS...)
            img: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 600 600'%3E%3Crect width='600' height='600' fill='%231a2a3a'/%3E%3Ctext x='50%25' y='20%25' font-size='28' fill='%23ffd966' text-anchor='middle' font-family='monospace' font-weight='bold'%3ETHOUGHTS%3C/text%3E%3Ctext x='50%25' y='32%25' font-size='28' fill='%23f9a26c' text-anchor='middle'%3EFEELINGS%3C/text%3E%3Ctext x='50%25' y='46%25' font-size='44' fill='%23f4d03f' text-anchor='middle' font-weight='bold'%3ECBT%3C/text%3E%3Ctext x='50%25' y='60%25' font-size='28' fill='%237dcea0' text-anchor='middle'%3EPHYSICAL%3C/text%3E%3Ctext x='50%25' y='72%25' font-size='28' fill='%235dade2' text-anchor='middle'%3EBEHAVIORS%3C/text%3E%3Ctext x='50%25' y='84%25' font-size='27' fill='%23e98a9e' text-anchor='middle'%3EREACTIONS%3C/text%3E%3Ctext x='50%25' y='93%25' font-size='20' fill='%23cdcdcd' text-anchor='middle'%3EFRAMEWORK%3C/text%3E%3C/svg%3E",
            url: "https://samir210-az.github.io/cbttest/cbttest",
            title: "CBT QİYMƏTLƏNDİRMƏ"
        },
        {
            img: "https://picsum.photos/id/26/600/600",   // test/analiz simvolikası (SAAS)
            url: "https://samir210-az.github.io/saas/",
            title: "SAAS TEST"
        },
        {
            img: "https://picsum.photos/id/20/600/600",   // erkən inkişaf (uşaq yazır)
            url: "https://samir210-az.github.io/TEST/",
            title: "ERKƏN İNKİŞAF"
        },
        {
            img: "https://picsum.photos/id/48/600/600",   // peşə seçimi (klaviatura / iş alətləri)
            url: "https://samir210-az.github.io/AN/",
            title: "TTAP PEŞƏ SEÇİMİ"
        }
    ];

    function renderTestGrid() {
        const gridContainer = document.getElementById('dynamicGrid');
        if (!gridContainer) return;
        gridContainer.innerHTML = '';

        testItems.forEach(item => {
            const imageUrl = item.img && item.img.trim() !== "" ? item.img : "https://picsum.photos/id/42/600/600";
            const targetUrl = item.url && item.url.trim() !== "" ? item.url : "#";
            const displayTitle = item.title ? item.title.toUpperCase() : "TEST";

            const cardDiv = document.createElement('div');
            cardDiv.className = 'card';

            const link = document.createElement('a');
            link.className = 'card-link';
            link.href = targetUrl;
            link.target = '_blank';
            link.rel = 'noopener noreferrer';

            const wrapper = document.createElement('div');
            wrapper.className = 'image-wrapper';

            // Şəkil SVG-dırsa (data:image/svg+xml) onu img kimi yüklə, əks halda adi img.
            if (imageUrl.startsWith('data:image/svg+xml')) {
                const img = document.createElement('img');
                img.src = imageUrl;
                img.alt = displayTitle;
                img.style.objectFit = 'cover';
                wrapper.appendChild(img);
            } else {
                const img = document.createElement('img');
                img.src = imageUrl;
                img.alt = displayTitle;
                img.loading = 'lazy';
                img.onerror = function() {
                    this.src = "https://picsum.photos/id/42/600/600";
                };
                wrapper.appendChild(img);
            }

            const overlayDiv = document.createElement('div');
            overlayDiv.className = 'overlay-text';
            const titleSpan = document.createElement('span');
            titleSpan.textContent = displayTitle;
            overlayDiv.appendChild(titleSpan);

            link.appendChild(wrapper);
            link.appendChild(overlayDiv);
            cardDiv.appendChild(link);
            gridContainer.appendChild(cardDiv);
        });
    }

    document.addEventListener('DOMContentLoaded', renderTestGrid);
</script>
<!-- 
   Qeyd: 
   - 5 test kartı ardıcıllıqla verilmiş linklərə uyğundur.
   - CBT kartının şəkli sizin göndərdiyiniz mətn əsasında SVG formatında yaradılmışdır (THOUGHTS, FEELINGS, CBT...).
   - İstənilən şəkli dəyişmək üçün testItems massivində "img" dəyərini yeniləyin.
-->
</body>
</html>
