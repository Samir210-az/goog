<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Denver II Test – Dəqiq Geriləmə + Yapışan Cədvəl</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
            background: #eef2f5;
            margin: 0;
            padding: 12px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 26px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            padding: 16px 18px 24px;
        }
        h1 {
            font-size: 1.5rem;
            color: #1e6b3b;
            border-left: 5px solid #1e6b3b;
            padding-left: 16px;
            margin-top: 0;
        }
        .tabs {
            display: flex;
            gap: 8px;
            margin: 16px 0;
            flex-wrap: wrap;
            border-bottom: 1px solid #ccc;
        }
        .tab-btn {
            background: none;
            border: none;
            padding: 8px 20px;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 30px 30px 0 0;
            color: #2c5a2e;
        }
        .tab-btn.active {
            background: #1e6b3b;
            color: white;
        }
        .tab-pane {
            display: none;
            animation: fade 0.2s;
        }
        .tab-pane.active {
            display: block;
        }
        @keyframes fade {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .info-panel {
            background: #e8f3ec;
            padding: 12px 16px;
            border-radius: 24px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
            align-items: flex-end;
        }
        .info-field {
            flex: 1;
            min-width: 130px;
        }
        .info-field label {
            font-weight: bold;
            font-size: 0.7rem;
            color: #1e6b3b;
            display: block;
            margin-bottom: 4px;
        }
        .info-field input {
            width: 100%;
            padding: 8px 12px;
            border-radius: 28px;
            border: 1px solid #cbdcc2;
            background: white;
            font-size: 0.85rem;
        }
        button {
            background: #1e6b3b;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            margin: 4px 4px 0 0;
            font-size: 0.8rem;
        }
        .btn-secondary {
            background: #4a6a5e;
        }
        .status {
            background: #fcf8e8;
            padding: 10px 14px;
            border-radius: 18px;
            margin: 12px 0;
            border-left: 5px solid #e9b35f;
            font-size: 0.85rem;
        }
        /* Cədvəl – iki istiqamətdə yapışma */
        .table-wrapper {
            overflow-x: auto;
            overflow-y: auto;
            border: 1px solid #d4dfe3;
            border-radius: 20px;
            margin-top: 20px;
            max-height: 70vh;
            position: relative;
        }
        .test-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.72rem;
            min-width: 800px;
        }
        .test-table th,
        .test-table td {
            border: 1px solid #d0dbdf;
            padding: 8px 5px;
            text-align: center;
            vertical-align: middle;
        }
        /* Yaş başlıqları – yuxarıda yapışsın */
        .test-table thead th {
            position: sticky;
            top: 0;
            background: #d9e8da;
            z-index: 20;
            backdrop-filter: blur(2px);
        }
        /* Sol sütun (maddə adları) – üfüqi yapışma */
        .test-table .item-name {
            position: sticky;
            left: 0;
            background-color: #fefaf0;
            z-index: 15;
            box-shadow: 1px 0 2px rgba(0,0,0,0.05);
            text-align: left;
        }
        /* Başlıqların sol küncü – həm yuxarı, həm sol yapışsın */
        .test-table thead th:first-child {
            position: sticky;
            left: 0;
            z-index: 30;
            background: #cbddce;
        }
        .domain-row {
            background: #cbddce;
            font-weight: bold;
            text-align: left;
        }
        .domain-row th {
            position: sticky;
            left: 0;
            background: #cbddce;
            z-index: 15;
        }
        .checkbox-cell input {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #1e6b3b;
        }
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .search-box input {
            flex: 2;
            padding: 10px 16px;
            border-radius: 32px;
            border: 1px solid #ccc;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 12px;
            margin-top: 20px;
        }
        .stat-card {
            background: #f0f7f0;
            padding: 12px;
            border-radius: 20px;
            text-align: center;
        }
        footer {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 25px;
            color: #5e7c6b;
        }
        .archive-row-select {
            cursor: pointer;
            transition: 0.1s;
        }
        .archive-row-select:hover {
            background: #e0f0e0;
        }
        @media (max-width: 700px) {
            .container { padding: 12px; }
            .test-table { font-size: 0.65rem; min-width: 720px; }
            .item-name { font-size: 0.65rem; min-width: 140px; }
            button { padding: 6px 14px; font-size: 0.75rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🏥 Denver II İnkişaf Testi <span style="font-size:0.8rem;">(Dəqiq Geriləmə + Yapışan Cədvəl)</span></h1>

    <div class="tabs">
        <button class="tab-btn active" data-tab="test">📋 Test cədvəli</button>
        <button class="tab-btn" data-tab="archive">📚 Arxiv & axtarış</button>
        <button class="tab-btn" data-tab="stats">📊 Statistika</button>
    </div>

    <!-- TEST PANELİ -->
    <div id="testPane" class="tab-pane active">
        <div class="info-panel">
            <div class="info-field"><label>👶 Uşağın adı</label><input type="text" id="childName" placeholder="Ad Soyad"></div>
            <div class="info-field"><label>🎂 Doğum tarixi</label><input type="date" id="dob"></div>
            <div class="info-field"><label>🆔 Qeydiyyat №</label><input type="text" id="regNo" placeholder="Qeydiyyat"></div>
            <div class="info-field"><label>📊 Faiz</label><input type="range" id="perc" min="0" max="100" value="50"><span id="percVal">50</span></div>
            <div>
                <button id="saveBtn">💾 Yadda saxla</button>
                <button id="clearCheckBtn" class="btn-secondary">🗑 Təmizlə</button>
                <button id="reportBtn" class="btn-secondary" style="background:#c96f0e;">📄 Hesabat çıxar</button>
            </div>
        </div>
        <div id="testMessage" class="status">✅ Cədvəldə işarələr edin. Sol sütun və başlıqlar sürüşdürmədə sabit qalır.</div>
        <div class="table-wrapper" id="testTableWrapper"></div>
    </div>

    <!-- ARXİV -->
    <div id="archivePane" class="tab-pane">
        <div class="search-box">
            <input type="text" id="searchName" placeholder="Uşaq adı ilə axtar...">
            <button id="searchBtn">🔍 Axtar</button>
            <button id="refreshArchiveBtn" class="btn-secondary">🔄 Yenilə</button>
        </div>
        <div id="archiveList" style="max-height: 500px; overflow-y: auto;"></div>
    </div>

    <!-- STATİSTİKA -->
    <div id="statsPane" class="tab-pane">
        <button id="calcStatsBtn" class="btn-secondary">📈 Yenilə statistika</button>
        <div id="statsContent" class="stats-grid"></div>
    </div>
    <footer>📌 Arxivdə test sətrinə kliklə → cədvələ yüklənir → "Hesabat çıxar" ilə dəqiq geriləmə (ay) və fərdi iş planı alın.</footer>
</div>

<script>
    // ========== APPS SCRIPT URL (işlək) ==========
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwUFz-JQcjv7iAuSiVYgV3aRSaFNU-FWbWhL5A6Tt7vB88FhdQ_v5fvbX4pfgs159Gs9Q/exec";
    
    // ========== DENVER II MADDƏLƏRİ ==========
    const domains = [
        { name: "🏃 KOBUD MOTOR", items: [ "Başını 1-2 dəq düz tutur","Üstüstə yatarkən başını qaldırır","Ayaqları ilə təpikləyir","Baş və döşü qaldırır","Başını düz saxlayır","Dayaqlı oturur","Qarından kürəyə dönür","Sürünməyə çalışır","Stabil oturur","Qaldırılanda ayaq üstə durur","Tutub qalxır","Kreslo ətrafında addımlayır","Müstəqil dayanır","Təkbaşına yeriyir","Pilləkənlərə dırmaşır","Arabaları itələyir","Kresloya dırmaşır","Arxaya doğru yeriyir","Pilləkənlə enib-qalxır","Tullanır","Qaçır","Özü stula oturur","Top atır","Düz qaçır, dırmaşır","Bir ayaqda dayanır, özü geyinir","Bir ayaqda dayanır, tullanır, velosiped" ] },
        { name: "✍ İNCƏ MOTOR", items: [ "İşığı izləyir","Zəngi yuxarı-aşağı izləyir","Nəzərini obyektdən obyektə keçirir","Kubu tutur","Əşyaları ağzına aparır","Kubu masadan qaldırır","Düşmüş əşyanı axtarır","Oyuncağı əlindən-ələ keçirir","İki əşya ilə oynayır","Kubları bir-birinə vurur","Cımbız tutuşu","Üç kiçik əşya saxlayır","Bir əl üstünlüyü","Dörd kub tutur","Əşyaları üst-üstə qoyur","Qaralamalar çəkir","3 kubdan qüllə","4 kubdan qüllə","5+ kubdan qüllə","Şaquli xətt kopyalayır","Üfüqi xətt kopyalayır","Dairə çəkir","Sancaq qaldırır","Bir göz qapalı detalları tanıyır","9 kubdan qüllə","Kərpicdən körpü","Kvadrat + dairə çəkir","Qələmi düzgün tutur" ] },
        { name: "🗣 DİL VƏ DANIŞMA", items: [ "Səslərdən qorxur","Zəng səsini dinləyir","Səs mənbəyini gözlə axtarır","Səsə baş çevirir","Musiqi eşidəndə səslənir","Vokalizasiyalar","Diqqət çəkmək üçün qışqırır","Mama/dada deyir","Saat tıqqıltısını dinləyir","2 söz bilir","3 söz bilir","Şəkilə baxır","Öz adını bilir","4-5 söz","6-7 söz","Cümlələşir","Şəkilli kitabları sevir","9 söz","12 söz","2 sözlü cümlələr","Nağıl dinləyir","20+ söz","4 oyuncağın adını çəkir","Nə? Harada? sualları","Bədən hissələrini adlandırır","Təmiz danışır, geniş cümlələr","Suallara cavab verir" ] },
        { name: "🧸 SOSİAL-ŞƏXSİ", items: [ "Qucağa alanda sakitləşir","Gülümsəyir","İnsanı izləyir","Müayinəçiyə qarşılıqlı gülümsəmə","Oyuna reaksiya","Danışana baş çevirir","Kassadan içir","Güzgüyə baxır","Fincanı tutmağa kömək edir","Güzgüdə təbəssüm","Barmaqları ilə yeyir","Əl çalır, yelləyir","Fincanı tutur","Qaşıqdan istifadə edir","Ayaqqabılarını göstərir","Qapı dəstəyini çevirir","Kubokla bacarır","Corab/ayaqqabı çıxarır","Bir bədən hissəsini tanıyır","Tualet istədiyini bildirir","Gündüz sidik nəzarəti","Başına gələni danışır","İki bədən hissəsini bilir","Dörd bədən hissəsi + qaşıq","Şalvarını tualet üçün endirir","Özü yeyir, yuyunur","Adını deyir, ev işlərində kömək edir","Əməkdaşlıq edir","Geyinir/təmizlənir" ] }
    ];
    const ageCols = ["2ay","4ay","6ay","9am","12ay","15ay","18ay","24ay","3yas","4yas","5yas","6yas"];
    const ageMonths = [2,4,6,9,12,15,18,24,36,48,60,72];
    
    // Cədvəl qurma (checksSet ilə)
    function buildFullTable(checksSet = new Set()) {
        let html = `<table class="test-table"><thead><tr><th class="item-name">İnkişaf sahəsi / Maddələr</th>${ageCols.map(a=>`<th>${a}</th>`).join('')}</tr></thead><tbody>`;
        domains.forEach(domain => {
            html += `<tr><th class="domain-row" colspan="${ageCols.length+1}">${domain.name}</th></tr>`;
            domain.items.forEach(item => {
                html += `<tr><td class="item-name">${item}</td>`;
                for(let i=0;i<ageCols.length;i++) {
                    const key = `${item}|${ageCols[i]}`;
                    const checked = checksSet.has(key) ? 'checked' : '';
                    html += `<td class="checkbox-cell"><input type="checkbox" data-item="${item.replace(/"/g, '&quot;')}" data-age="${ageCols[i]}" ${checked}></td>`;
                }
                html += `</tr>`;
            });
        });
        html += `</tbody></table>`;
        document.getElementById("testTableWrapper").innerHTML = html;
    }
    
    function getAllChecks() {
        let checks = [];
        document.querySelectorAll("#testTableWrapper input[type=checkbox]:checked").forEach(cb => {
            checks.push(cb.getAttribute("data-item") + "|" + cb.getAttribute("data-age"));
        });
        return checks;
    }
    
    function setChecksFromArray(checksArray) {
        const chkSet = new Set(checksArray);
        buildFullTable(chkSet);
    }
    
    function calculateAge(birthDateStr) {
        if(!birthDateStr) return null;
        const birth = new Date(birthDateStr);
        const today = new Date();
        let months = (today.getFullYear() - birth.getFullYear())*12 + (today.getMonth()-birth.getMonth());
        if(today.getDate() < birth.getDate()) months--;
        return months;
    }
    
    // YENİ TƏQRİBİ İNKİŞAF YAŞI HESABLAMA (orta çəkili – işarələnmiş bacarıqların yaşlarının ortalaması)
    function calculateDevelopmentalAge(checksArray) {
        if(checksArray.length === 0) return 0;
        let totalMonth = 0;
        let count = 0;
        for(let chk of checksArray) {
            const agePart = chk.split('|')[1]; // məsələn "12ay"
            if(agePart) {
                let monthVal = 0;
                if(agePart === "2ay") monthVal=2;
                else if(agePart === "4ay") monthVal=4;
                else if(agePart === "6ay") monthVal=6;
                else if(agePart === "9am") monthVal=9;
                else if(agePart === "12ay") monthVal=12;
                else if(agePart === "15ay") monthVal=15;
                else if(agePart === "18ay") monthVal=18;
                else if(agePart === "24ay") monthVal=24;
                else if(agePart === "3yas") monthVal=36;
                else if(agePart === "4yas") monthVal=48;
                else if(agePart === "5yas") monthVal=60;
                else if(agePart === "6yas") monthVal=72;
                totalMonth += monthVal;
                count++;
            }
        }
        if(count === 0) return 0;
        const rawAvg = totalMonth / count;
        // Yuvarlaqlaşdırma: ən yaxın tam aya
        return Math.round(rawAvg);
    }
    
    // Geriləmə analizi (yeni alqoritm)
    function analyzeAdvanced(childName, dob, checksArray) {
        const factualAge = calculateAge(dob);
        if(factualAge === null) return { error: "Doğum tarixi keçərsiz" };
        const developmentalAge = calculateDevelopmentalAge(checksArray);
        let delayMonths = factualAge - developmentalAge;
        if(delayMonths < 0) delayMonths = 0;
        
        // Gecikmə sayı (yaş səviyyəsində olub işarələnməyən? – burada sadəcə məlumat üçün saxlayırıq)
        const checkedSet = new Set(checksArray);
        let delayCount = 0;
        let ageIndex = 0;
        for(let i=0; i<ageMonths.length; i++) {
            if(factualAge >= ageMonths[i]) ageIndex = i;
            else break;
        }
        domains.forEach(domain => {
            domain.items.forEach(item => {
                for(let col=0; col<=ageIndex; col++) {
                    const key = `${item}|${ageCols[col]}`;
                    if(!checkedSet.has(key)) delayCount++;
                }
            });
        });
        
        let evaluation = "";
        if(delayCount === 0) evaluation = "✅ Normal (yaşına uyğun inkişaf)";
        else if(delayCount >= 2 || delayMonths >= 3) evaluation = "⚠️ Anormal – Dərinləşdirilmiş qiymətləndirmə tövsiyyə olunur";
        else evaluation = "🔍 Şübhəli – Təkrar test və müşahidə";
        
        return { childName, dob, factualAge, developmentalAge, delayMonths, delayCount, evaluation };
    }
    
    // Fərdi iş planı (geniş, siyahı yoxdur)
    function generateDetailedPlan(analysis) {
        let planHtml = `<div style="background:#e8f0fe; padding:18px; border-radius:24px; margin:20px 0;">`;
        planHtml += `<h3>📘 Fərdi İş Planı (Beynəlxalq Erkən Müdaxilə Prinsipləri)</h3>`;
        planHtml += `<p><strong>🕒 Geriləmə (İnkişaf fərqi):</strong> Faktiki yaş <strong>${analysis.factualAge} ay</strong>, test nəticələrinə əsasən təqribi inkişaf yaşı <strong>${analysis.developmentalAge} ay</strong>. <span style="background:#ffecb3;">Geriləmə müddəti: ${analysis.delayMonths} ay</span>. ${analysis.delayMonths > 0 ? 'Bu, uşağın dəstəyə ehtiyacı olduğunu göstərir.' : 'Uşaq yaşına uyğun inkişaf edir, lakin profilaktik tədbirlər davam etdirilməlidir.'}</p>`;
        planHtml += `<p><strong>🎯 Ümumi yanaşma:</strong> Oyun əsaslı, ailə mərkəzli, müsbət gücləndirmə. Hər kiçik irəliləyiş qeydə alınmalıdır.</p>`;
        
        if(analysis.delayMonths === 0) {
            planHtml += `<p>✅ Geriləmə yoxdur. Standart inkişaf oyunları, gündəlik kitab oxumaq, fiziki aktivlik və sosial qarşılıqlı əlaqə kifayətdir.</p>`;
        } else {
            planHtml += `<div style="margin-top:12px;"><h4>🏃‍♂️ Ümumi tövsiyələr:</h4>`;
            planHtml += `<p><strong>👩‍⚕️ Psixoloq / Mütəxəssis üçün:</strong> Həftədə ən az 2 seans erkən müdaxilə proqramı. Hər seansda inkişafın zəif sahələrinə (motor, dil, sosial) yönəlik oyun terapiyası. Ailəyə koçluq dəstəyi.</p>`;
            planHtml += `<p><strong>👪 Valideynlər üçün gündəlik fəaliyyətlər:</strong> Hər gün 20-30 dəqiqə keyfiyyətli vaxt – birlikdə şəkil çəkmə, tapmaca oyunları, top oynama, kitab oxuma, gündəlik işlərdə uşağa məsuliyyət vermə (qaşıq tutmaq, fincanı saxlamaq). Uşağın səsli ifadələrini təşviq edin, təqlid oyunları oynayın.</p>`;
            planHtml += `<p><strong>🌍 Qlobal prinsiplər:</strong> Ümumdünya Sağlamlıq Təşkilatının (WHO) "Care for Child Development" paketinə əsasən, valideyn-uşaq qarşılıqlı əlaqəsi, həssas cavablandırma, öyrənəcəyi mühitin zənginləşdirilməsi vacibdir.</p>`;
            planHtml += `</div>`;
        }
        planHtml += `<hr><p><strong>📌 Qeyd:</strong> Bu plan Denver II testinin cavablarına əsasən avtomatik yaradılmışdır. Mütləq şəkildə bir pediatr və ya inkişaf psixoloqu tərəfindən dəyərləndirilməli və fərdiləşdirilməlidir.</p>`;
        planHtml += `</div>`;
        return planHtml;
    }
    
    // HESABAT YARATMA (yalnız analiz + plan)
    async function generateReportFromChecks(childName, dob, checksArray) {
        if(!childName || !dob) { alert("Uşağın adı və doğum tarixi olmalıdır"); return null; }
        const analysis = analyzeAdvanced(childName, dob, checksArray);
        if(analysis.error) { alert(analysis.error); return null; }
        const plan = generateDetailedPlan(analysis);
        const reportHtml = `
        <!DOCTYPE html>
        <html>
        <head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Denver II Hesabat - ${escapeHtml(childName)}</title>
        <style>body{font-family:Segoe UI,sans-serif;margin:20px;background:#f8faf8;}.report{max-width:1100px;margin:auto;background:white;padding:24px;border-radius:30px;}.info{background:#eef5ea;padding:16px;border-radius:20px;margin-bottom:20px;}</style>
        </head>
        <body>
        <div class="report">
            <h1>🏥 Denver II Gelişim Testi – Fərdi Hesabat</h1>
            <div class="info">
                <p><strong>Uşaq:</strong> ${escapeHtml(childName)}</p>
                <p><strong>Doğum tarixi:</strong> ${dob} | Faktiki yaş: ${analysis.factualAge} ay</p>
                <p><strong>Test tarixi:</strong> ${new Date().toLocaleDateString('az-AZ')}</p>
                <p><strong>📊 Təqribi inkişaf yaşı (işarələnmiş bacarıqların orta yaşı):</strong> ${analysis.developmentalAge} ay</p>
                <p><strong>⏳ Geriləmə (faktiki - inkişaf yaşı):</strong> ${analysis.delayMonths} ay</p>
                <p><strong>⚠️ Yaş səviyyəsində işarələnməmiş bacarıq sayı:</strong> ${analysis.delayCount} &nbsp;| <strong>🔔 Nəticə:</strong> ${analysis.evaluation}</p>
            </div>
            ${plan}
            <footer>Bu hesabat Denver II testinin cavablarına əsaslanır. Həmişə peşəkar rəyi ilə birlikdə istifadə edilməlidir.</footer>
        </div>
        </body>
        </html>
        `;
        return reportHtml;
    }
    
    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
    
    // UI
    const msgDiv = document.getElementById("testMessage");
    function showTestMessage(msg, col){ msgDiv.innerHTML=msg; msgDiv.style.borderLeftColor=col||"#e9b35f"; }
    
    document.getElementById("saveBtn").onclick = async () => {
        const name = document.getElementById("childName").value.trim();
        if(!name){ showTestMessage("❌ Uşaq adını yazın!","red"); return; }
        const checks = getAllChecks();
        const url = `${SCRIPT_URL}?action=save&name=${encodeURIComponent(name)}&dob=${document.getElementById("dob").value}&reg=${encodeURIComponent(document.getElementById("regNo").value)}&checks=${encodeURIComponent(checks.join(";"))}&perc=${document.getElementById("perc").value}`;
        showTestMessage("Göndərilir...","blue");
        try{
            const resp = await fetch(url);
            const txt = await resp.text();
            if(txt==="OK") showTestMessage("✅ Məlumatlar saxlanıldı!","green");
            else showTestMessage("⚠️ Xəta: "+txt,"red");
        }catch(e){ showTestMessage("❌ Şəbəkə xətası","red"); }
    };
    
    document.getElementById("reportBtn").onclick = async () => {
        const name = document.getElementById("childName").value.trim();
        const dob = document.getElementById("dob").value;
        if(!name || !dob){ showTestMessage("Hesabat üçün ad və doğum tarixi yazın","red"); return; }
        const checks = getAllChecks();
        if(checks.length===0){ showTestMessage("Heç bir işarə yoxdur","orange"); return; }
        const report = await generateReportFromChecks(name, dob, checks);
        if(report){
            const win = window.open();
            win.document.write(report);
            win.document.close();
        }
    };
    
    document.getElementById("clearCheckBtn").onclick = () => { buildFullTable(new Set()); showTestMessage("Təmizləndi","blue"); };
    document.getElementById("perc").oninput = () => document.getElementById("percVal").innerText = document.getElementById("perc").value;
    
    // ========== ARXİV VƏ STATİSTİKA ==========
    let allRecords = [];
    async function loadAllData() {
        try{
            const resp = await fetch(SCRIPT_URL+"?action=load");
            const data = await resp.json();
            allRecords = Array.isArray(data) ? data : [];
            return allRecords;
        }catch(e){ return []; }
    }
    async function displayArchive(searchTerm=""){
        const records = await loadAllData();
        const container = document.getElementById("archiveList");
        if(!records.length){ container.innerHTML=`<div class="status">⚠️ Heç bir test yoxdur</div>`; return; }
        let filtered = records;
        if(searchTerm.trim()) filtered = records.filter(r=>r[1] && r[1].toLowerCase().includes(searchTerm.toLowerCase()));
        if(!filtered.length){ container.innerHTML=`<div class="status">🔍 Nəticə yoxdur</div>`; return; }
        let html = `<div class="table-wrapper"><table class="test-table"><thead><tr><th>Tarix</th><th>Uşaq adı</th><th>Doğum</th><th>Qeydiyyat</th><th>Faiz</th><th>Bac.Say</th></thead><tbody>`;
        filtered.slice().reverse().forEach((row,idx)=>{
            const checksField = row[4] || "";
            const count = checksField.split(";").filter(c=>c).length;
            html += `<tr class="archive-row-select" data-name="${escapeHtml(row[1]||'')}" data-dob="${row[2]||''}" data-checks="${escapeHtml(checksField)}" data-reg="${row[3]||''}" data-perc="${row[5]||''}">
                        <td>${(row[0]||'').slice(0,16)}</td><td>${row[1]||''}</td><td>${row[2]||''}</td><td>${row[3]||''}</td><td>${row[5]||''}</td><td>${count}</td>
                       </tr>`;
        });
        html += `</tbody>表</div><p style="font-size:0.7rem;">📌 Sətirə kliklə → test yüklənir, "Hesabat çıxar" edin.</p>`;
        container.innerHTML = html;
        document.querySelectorAll('.archive-row-select').forEach(tr => {
            tr.addEventListener('click', () => {
                const name = tr.getAttribute('data-name');
                const dob = tr.getAttribute('data-dob');
                const checksStr = tr.getAttribute('data-checks');
                const reg = tr.getAttribute('data-reg');
                const perc = tr.getAttribute('data-perc');
                document.getElementById("childName").value = name;
                document.getElementById("dob").value = dob;
                document.getElementById("regNo").value = reg;
                document.getElementById("perc").value = perc || 50;
                document.getElementById("percVal").innerText = perc || 50;
                const checksArray = checksStr ? checksStr.split(";").filter(c=>c) : [];
                setChecksFromArray(checksArray);
                showTestMessage(`📂 "${name}" testi yükləndi. İndi "Hesabat çıxar" edə bilərsiniz.`, "blue");
                document.querySelector('.tab-btn[data-tab="test"]').click();
            });
        });
    }
    
    async function displayStats(){
        const records = await loadAllData();
        if(!records.length){ document.getElementById("statsContent").innerHTML=`<div class="stat-card">Məlumat yoxdur</div>`; return; }
        const total = records.length;
        const unique = new Set(records.map(r=>r[1])).size;
        let skillCount = {};
        records.forEach(r=>{ (r[4]||"").split(";").forEach(s=>{ if(s) skillCount[s]=(skillCount[s]||0)+1; }); });
        const top = Object.entries(skillCount).sort((a,b)=>b[1]-a[1]).slice(0,5);
        const avgPerc = records.reduce((s,r)=>s+(parseInt(r[5])||0),0)/total;
        document.getElementById("statsContent").innerHTML = `<div class="stat-card"><h3>📋 Ümumi testlər</h3><p>${total}</p></div>
        <div class="stat-card"><h3>👶 Fərqli uşaqlar</h3><p>${unique}</p></div>
        <div class="stat-card"><h3>📊 Orta faiz</h3><p>${avgPerc.toFixed(1)}</p></div>
        <div class="stat-card"><h3>🏆 Top 5 bacarıq</h3><ul>${top.map(t=>`<li>${t[0].slice(0,30)}... (${t[1]})</li>`).join('')}</ul></div>`;
    }
    
    document.querySelectorAll(".tab-btn").forEach(btn => {
        btn.addEventListener("click", () => {
            document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
            btn.classList.add("active");
            document.querySelectorAll(".tab-pane").forEach(p=>p.classList.remove("active"));
            const tab = btn.getAttribute("data-tab");
            document.getElementById(`${tab}Pane`).classList.add("active");
            if(tab==="archive") displayArchive(document.getElementById("searchName").value);
            if(tab==="stats") displayStats();
        });
    });
    document.getElementById("searchBtn").onclick = () => displayArchive(document.getElementById("searchName").value);
    document.getElementById("refreshArchiveBtn").onclick = () => displayArchive(document.getElementById("searchName").value);
    document.getElementById("calcStatsBtn").onclick = () => displayStats();
    
    buildFullTable(new Set());
    showTestMessage("Hazır. Cədvəldə üfüqi/şaquli sürüşdürmə zamanı maddələr və başlıqlar sabitdir. Geriləmə dəqiq hesablanır.","green");
</script>
</body>
</html>
